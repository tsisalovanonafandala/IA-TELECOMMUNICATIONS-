<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Email</title>
<style>
body { background:#05080f; color:#e6eaf2; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.box { background:#0e1626; border:2px solid #22d3ee; border-radius:16px; padding:30px 20px; width:90%; max-width:400px; text-align:center; }
h2 { color:#22d3ee; margin-bottom:10px; }
input { width:100%; padding:12px; border-radius:10px; border:none; font-size:15px; margin:15px 0; box-sizing:border-box; }
button { background:#22d3ee; color:#000; border:none; padding:14px; width:100%; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; }
#result { margin-top:15px; font-size:14px; color:#4ade80; display:none; }
</style>
</head>
<body>
<div class="box">
  <h2>✉️ Test Email</h2>
  <p>Entrez votre email pour tester</p>
  <input type="email" id="emailInput" placeholder="votre@email.com"/>
  <button onclick="continuer()">Continuer</button>
  <div id="result"></div>
</div>
<script>
function continuer(){
  var v = document.getElementById("emailInput").value.trim();
  var res = document.getElementById("result");
  if(!v || !v.includes("@")){
    res.style.color = "#f87171";
    res.style.display = "block";
    res.textContent = "❌ Email invalide";
    return;
  }
  res.style.color = "#4ade80";
  res.style.display = "block";
  res.textContent = "✅ Email accepté : " + v;
}
</script>
</body>
</html>
